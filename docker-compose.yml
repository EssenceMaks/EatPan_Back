services:
  valkey_cache:
    image: valkey/valkey:latest
    container_name: valkey_cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - default

  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    networks:
      - default

  django_api:
    build: .
    container_name: django_api
    # Під час розробки ми використовуємо runserver для гарячого перезавантаження (Hot Reload).
    # На продакшені тут буде команда Gunicorn, винесена в Dockerfile.
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
      - ..:/workspace:ro
    ports:
      - "6600:8000"
    depends_on:
      - valkey_cache
      - nats
    restart: unless-stopped
    networks:
      - default
      - supabase_net

  sync_publisher:
    build: .
    container_name: sync_publisher
    command: python manage.py sync_publisher --loop --sleep-seconds 1
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - nats
      - valkey_cache
    restart: unless-stopped
    networks:
      - default
      - supabase_net

  sync_consumer:
    build: .
    container_name: sync_consumer
    command: python manage.py sync_consumer --loop --sleep-seconds 1
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - nats
      - valkey_cache
    restart: unless-stopped
    networks:
      - default
      - supabase_net

networks:
  default:
    name: eatpan_back_default
  supabase_net:
    external: true
    name: supabase_default
